name: doorr
description: "Android search frontend for Prowlarr and Jackett"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/lang.json

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  http_mock_adapter: ^0.6.1
  flutter_launcher_icons: ^0.14.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2
  dtorrent_parser: ^1.0.9
  dio: ^5.9.2
  open_filex: ^4.7.0
  path_provider: ^2.1.5

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/logo.png"