name: doorr
description: "An interface for searching and downloading torrents from Prowlarr and Jackett on Android"
publish_to: 'none'
version: 1.0.0+1

homepage: https://github.com/Lifailon/doorr
repository: https://github.com/Lifailon/doorr
issue_tracker: https://github.com/Lifailon/doorr/issues
maintainer: "Lifailon"

environment:
  sdk: ^3.11.5

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/lang.json

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  http_mock_adapter: ^0.6.1
  flutter_launcher_icons: ^0.14.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2
  dtorrent_parser: ^1.0.9
  dio: ^5.9.2
  open_filex: ^4.7.0
  path_provider: ^2.1.5
  share_plus: ^13.1.0
  font_awesome_flutter: ^11.0.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icon.png"