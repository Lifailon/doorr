Categories:
  - Connectivity
  - Multimedia

License: MIT
SourceCode: https://github.com/Lifailon/doorr
IssueTracker: https://github.com/Lifailon/doorr/issues

RepoType: git
Repo: https://github.com/Lifailon/doorr

Builds:
  - versionName: 1.0.0
    versionCode: 1
    commit: 254d722c57f63e61d8bbb08dc0891cb33523555a
    output: build/app/outputs/flutter-apk/app-release.apk
    srclibs:
      - flutter@stable
    rm:
      - web
    prebuild:
      - flutterVersion=$(cat .flutter-version)
      - git -C $$flutter$$ checkout -f $flutterVersion
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get
    scanignore:
      - $$flutter$$/bin/cache
    scandelete:
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release

AutoUpdateMode: Version
UpdateCheckMode: Tags
UpdateCheckData: pubspec.yaml|version:\s.+\+(\d+)|.|version:\s(.+)\+
CurrentVersion: 1.0.0
CurrentVersionCode: 1
